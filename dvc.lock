    - path: src/data/validate/validate_raw.py
      hash: md5
      md5: b86d49addf6eaf7b24ffa17349b32600
      size: 19764
    params:
      params.yaml:
        raw_validation:
          sample_size: 10
          chunk_size: 10000
          file:
            must_exist: true
            min_size_mb: 1000
          layout:
            name_pattern: ^Layout
            min_layouts: 1
          required_datasets:
          - Wind Speed
          - Wind Direction
          - Turbulence Intensity
          - Turbine Power
          - Turbine Wind Speed
          - Yaw Angles
          dtypes:
            Wind Speed: float32
            Wind Direction: float32
            Turbulence Intensity: float32
            Turbine Power: float32
            Turbine Wind Speed: float32
            Yaw Angles: float32
          dimensions:
            scenario_axis: 0
            require_non_empty: true
          constraints:
            Wind Speed:
              min: 0
              max: 50
              allow_nan: false
              allow_inf: false
            Wind Direction:
              min: 0
              max: 360
              allow_nan: false
              allow_inf: false
            Turbulence Intensity:
              min: 0
              max: 1.0
              allow_nan: false
              allow_inf: false
            Turbine Power:
              min: 0
              allow_nan: false
              allow_inf: false
            Turbine Wind Speed:
              min: 0
              max: 50
              allow_nan: false
              allow_inf: false
            Yaw Angles:
              min: -180
              max: 180
              allow_nan: false
              allow_inf: false
    outs:
    - path: metrics/raw_validation.json
      hash: md5
      md5: 12e214ef1b2fde383a50ef790c9a6fa9
      size: 698
  extract_scenario_dataset:
    cmd: python -m src.data.extract.extract_to_parquet
    deps:
    - path: configs/schema_lock.yaml
      hash: md5
      md5: 1946d51ff79b6508524841058feaaa87
      size: 1075
    - path: data/raw/wind_plant_data.h5
