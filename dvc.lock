    params:
      params.yaml:
        data_ingestion:
          s3_url: 
            s3://nrel-pds-windai/wind_plant_power/floris/v1.0.0/wind_plant_data.h5
          local_path: data/raw/wind_plant_data.h5
          retries: 3
          timeout: 30
    outs:
    - path: data/raw/wind_plant_data.h5
      hash: md5
      md5: e8195c161ecdb47f2114451e75b2c16e
      size: 4791736756
  validate_raw:
    cmd: python src/data/validate/validate_raw.py
    deps:
    - path: data/raw/wind_plant_data.h5
      hash: md5
      md5: e8195c161ecdb47f2114451e75b2c16e
