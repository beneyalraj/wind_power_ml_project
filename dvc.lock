      size: 4099
    - path: src/data/extract/
      hash: md5
      md5: 2d554774a4121c026239e2e4011fdc90.dir
      size: 22471
      nfiles: 6
    params:
      params.yaml:
        extraction:
          input_path: data/raw/wind_plant_data.h5
          output_path: data/interim/scenario_dataset_v1
          schema_path: configs/schema_lock.yaml
          development_mode: true
          max_layouts: 10
          partition_by:
          - layout_id
          layouts_per_iteration: 10
          rows_per_batch: 50000
          parquet:
            compression: snappy
            row_group_size: 10000
            write_statistics: true
          overwrite_existing: false
          deterministic_order: true
          logging:
            log_file: logs/extraction.log
            progress_interval: 5000
    outs:
    - path: data/interim/scenario_dataset_v1
      hash: md5
      md5: b91855a51dd513c50894d7e0ca1d6a12.dir
