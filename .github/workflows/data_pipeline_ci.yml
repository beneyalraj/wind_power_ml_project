name: Data Pipeline CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/data/**'
      - 'src/dataset_builder/**'
      - 'src/training/**'
      - 'dvc.yaml'
      - 'params.yaml'
      - 'airflow/**'
      - 'requirements.txt' 
  workflow_dispatch:    
jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' 
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[s3]
          # Install Airflow using official constraints to prevent pendulum/dependency conflicts
          pip install "apache-airflow==2.7.0" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.7.0/constraints-3.11.txt"

      - name: Validate DVC pipeline
        run: dvc dag

      - name: Validate Airflow DAGs
        run: |
          python -c "from airflow.models import DagBag; bag = DagBag(dag_folder='airflow/dags', include_examples=False); assert not bag.import_errors, f'DAG import errors found: {bag.import_errors}'"