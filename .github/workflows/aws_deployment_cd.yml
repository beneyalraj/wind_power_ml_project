name: Deploy to EC2

on:
  workflow_dispatch:        # Manual trigger only — deploy when YOU decide
                            # GitHub Actions tab → Deploy to EC2 → Run workflow

jobs:
  deploy:
    name: Deploy App to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/wind_power_ml_project

            # Force sync with GitHub — discards any local changes
            git fetch origin main
            git reset --hard origin/main

            # Bring down cleanly first — prevents orphaned containers
            # Without this, Docker leaves broken containers with hash names
            # when image names change between builds
            docker-compose -f docker-compose.serve.yml \
                           -f docker-compose.serve.prod.yml \
                           down

            # Rebuild and restart fresh
            # --remove-orphans: cleans up containers no longer in compose file
            docker-compose -f docker-compose.serve.yml \
                           -f docker-compose.serve.prod.yml \
                           up -d --build --remove-orphans

            # Remove old dangling images to keep 20GB disk usage under control
            docker image prune -af