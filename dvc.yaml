stages:
  data_ingestion:
    cmd: python src/ingestion/load_data.py
    deps:
      - src/ingestion/load_data.py
      - params.yaml
    params:
      - data_ingestion
    outs:
      - data/raw/wind_plant_data.h5
    desc: "Download wind plant data from S3"

  validate_raw:
    cmd: python src/data/validate/validate_raw.py
    deps:
      - src/data/validate/validate_raw.py
      - data/raw/wind_plant_data.h5
      - params.yaml
    params:
      - raw_validation
    metrics:
      - metrics/raw_validation.json:
          cache: false
    desc: "Validate raw HDF5 data structure and quality"

  extract_scenario_dataset:
    cmd: python -m src.data.extract.extract_to_parquet
    deps:
      - src/data/extract/
      - src/core/config_manager.py
      - configs/schema_lock.yaml
      - params.yaml
      - data/raw/wind_plant_data.h5
    params:
      - extraction
    outs:
      - data/interim/scenario_dataset_v1
    desc: "Extract scenario-level dataset from HDF5 to partitioned Parquet"

  validate_processed:
    cmd: python -m src.data.validate.validate_processed
    deps:
      - src/data/validate/validate_processed.py
      - data/interim/scenario_dataset_v1
    metrics:
      - metrics/processed_validation.json:
          cache: false
    desc: "Validate processed scenario-level dataset"

  dataset_split:
    cmd: python src/dataset/split_dataset.py
    deps:
      - data/interim/scenario_dataset_v1
      - src/dataset/split_dataset.py
    outs:
      - data/interim/splits/train
      - data/interim/splits/validation
      - data/interim/splits/test

  feature_extraction:
    cmd: python src/features/build_features.py
    deps:
      - data/interim/splits
      - configs/feature_spec.yaml
      - src/features/build_features.py
    outs:
      - data/features

  feature_validation:
    cmd: python src/validation/validate_features.py
    deps:
      - data/features
      - configs/feature_spec.yaml
      - src/validation/validate_features.py
    outs:
      - data/validated_features
