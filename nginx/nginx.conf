events {
    worker_connections 1024;
}

http {
    # CRITICAL: Tells Nginx how to serve CSS, JS, and HTML properly
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allow larger payloads for batch prediction requests
    client_max_body_size 10M;

    server {
        listen 80;

        # -------------------------------------------------------------------
        # 1. FastAPI Backend (routed via /api/)
        # Traffic to http://<ip>/api/... gets proxied to FastAPI internally
        # -------------------------------------------------------------------
        location /api/ {
            proxy_pass http://fastapi:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Prevent Nginx dropping connection during heavy inference
            proxy_read_timeout    120s;
            proxy_connect_timeout 120s;
        }

        # -------------------------------------------------------------------
        # 2. Evidently Drift Report (static HTML file)
        # http://<ip>/report serves reports/drift_report.html
        # -------------------------------------------------------------------
        location /report {
            alias /usr/share/nginx/html/report/;
            index drift_report.html;
            
            # Checks for exact URI, then directory, then falls back to the report
            try_files $uri $uri/ /drift_report.html =404;
        }

        # -------------------------------------------------------------------
        # 3. Streamlit WebSockets (critical for live interactivity)
        # -------------------------------------------------------------------
        location /_stcore/stream {
            proxy_pass http://streamlit:8501/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;   # 24 hours — keeps websocket alive
        }

        # -------------------------------------------------------------------
        # 4. Streamlit UI (default catch-all)
        # Everything not matched above goes to the Streamlit dashboard
        # -------------------------------------------------------------------
        location / {
            proxy_pass http://streamlit:8501/;
            proxy_set_header Host        $host;
            proxy_set_header X-Real-IP   $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}