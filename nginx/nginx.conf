events {
    worker_connections 1024;
}

http {
    # Allow larger payloads (e.g., if you ever upload batch CSVs to the UI)
    client_max_body_size 10M;

    server {
        listen 80;

        # -------------------------------------------------------------------
        # 1. FastAPI Backend (Routed via /api/)
        # -------------------------------------------------------------------
        location /api/ {
            proxy_pass http://fastapi:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Prevent timeouts during heavy inference
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
        }

        # -------------------------------------------------------------------
        # 2. Streamlit WebSockets (Critical for live interactivity)
        # -------------------------------------------------------------------
        location /_stcore/stream {
            proxy_pass http://streamlit:8501/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # -------------------------------------------------------------------
        # 3. Streamlit UI (Default catch-all)
        # -------------------------------------------------------------------
        location / {
            proxy_pass http://streamlit:8501/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}